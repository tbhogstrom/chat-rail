<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SFW Call Bridge — Dashboard</title>
  <style>
    :root {
      --bg: #0f1320;
      --panel: #1a2036;
      --border: #2a3252;
      --text: #e6ecff;
      --muted: #8c97c2;
      --red: #f87171;
      --green: #4ade80;
      --accent: #7c9cff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif;
           background: var(--bg); color: var(--text); line-height: 1.4; }
    header { padding: 12px 20px; background: var(--panel); border-bottom: 1px solid var(--border);
             display: flex; justify-content: space-between; align-items: center; }
    h1 { margin: 0; font-size: 18px; font-weight: 600; }
    #session-info { font-size: 12px; color: var(--muted); }
    main { display: grid; grid-template-columns: 1fr 420px; gap: 16px;
           padding: 16px; height: calc(100vh - 52px); }
    section { background: var(--panel); border: 1px solid var(--border);
              border-radius: 8px; padding: 16px; overflow: auto; }
    section h2 { margin: 0 0 12px; font-size: 14px; color: var(--muted);
                 text-transform: uppercase; letter-spacing: 0.08em; }
    #transcript-body { font-size: 14px; white-space: pre-wrap; word-break: break-word; }
    .field { display: grid; grid-template-columns: 14px 110px 1fr;
             gap: 10px; align-items: center; margin-bottom: 8px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); }
    .dot.green { background: var(--green); }
    .field label { font-size: 13px; color: var(--muted); }
    .field input { background: var(--bg); border: 1px solid var(--border);
                   color: var(--text); padding: 6px 8px; border-radius: 4px;
                   font-size: 13px; font-family: inherit; }
    .actions { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
    #claude-tools { display: flex; flex-direction: column; gap: 8px; }
    button { background: var(--accent); color: #0a0f1f; border: none;
             padding: 10px 12px; border-radius: 6px; font-size: 13px;
             font-weight: 600; cursor: pointer; text-align: left; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.secondary { background: var(--bg); color: var(--text);
                       border: 1px solid var(--border); }
    hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
    textarea { background: var(--bg); border: 1px solid var(--border);
               color: var(--text); padding: 8px; border-radius: 4px;
               font-size: 13px; font-family: inherit; resize: vertical; min-height: 80px; }
    #toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
             background: var(--panel); border: 1px solid var(--border);
             padding: 10px 16px; border-radius: 6px; font-size: 13px;
             opacity: 0; transition: opacity 0.2s; pointer-events: none; max-width: 80%; }
    #toast.show { opacity: 1; pointer-events: auto; }
    #toast.error { border-color: var(--red); }
    .ended { color: var(--muted); font-style: italic; }

    /* Transcript highlight — underline only, no background fill.
       Keeps the transcript readable and selection easy to see. */
    mark.hl { background: transparent; color: inherit; padding: 0;
              border-radius: 0; border-bottom: 2px solid transparent; }
    mark.hl-caller-name { border-bottom-color: #4ade80; }   /* green */
    mark.hl-rep-name    { border-bottom-color: #7c9cff; }   /* blue  */
    mark.hl-phone       { border-bottom-color: #fbbf24; }   /* amber */
    mark.hl-email       { border-bottom-color: #a855f7; }   /* purple */
    mark.hl-address,
    mark.hl-city,
    mark.hl-state,
    mark.hl-zip         { border-bottom-color: #2dd4bf; }   /* teal  */
    mark.hl-company     { border-bottom-color: #fb923c; }   /* orange */
    mark.hl[data-field] { cursor: pointer; }

    /* Native text selection should be easy to see across highlights. */
    #transcript-body ::selection { background: #3b4a80; color: var(--text); }
    #transcript-body::selection  { background: #3b4a80; color: var(--text); }

    #legend { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 12px; }
    #legend .chip { font-size: 11px; padding: 2px 8px; border-radius: 3px;
                    border-bottom: 2px solid; text-transform: uppercase;
                    letter-spacing: 0.06em; }

    /* ---- sell-o-meter ---- */
    #sellometer { margin-bottom: 16px; }
    #sm-score { font-size: 24px; font-weight: 700; }
    #sm-bar { height: 10px; background: var(--bg); border: 1px solid var(--border);
              border-radius: 5px; overflow: hidden; }
    #sm-fill { height: 100%; width: 0%; background: var(--accent);
               transition: width 0.4s ease; }
    #sm-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .sm-chip { display: inline-flex; align-items: center; gap: 6px;
               font-size: 11px; padding: 2px 8px; border-radius: 3px;
               border: 1px solid var(--border); color: var(--muted);
               text-transform: uppercase; letter-spacing: 0.06em; }
    .sm-chip .dot { width: 8px; height: 8px; }
    .sm-chip.hit { color: var(--text); border-color: var(--green); }
  </style>
</head>
<body>
  <header>
    <h1>SFW Call Bridge — Dashboard</h1>
    <div id="session-info">Waiting for call…</div>
  </header>
  <main>
    <section id="transcript">
      <h2>Live Transcript</h2>
      <div id="legend">
        <span class="chip hl-caller-name">Caller</span>
        <span class="chip hl-rep-name">Rep</span>
        <span class="chip hl-phone">Phone</span>
        <span class="chip hl-email">Email</span>
        <span class="chip hl-address">Location</span>
        <span class="chip hl-company">Company</span>
      </div>
      <div id="transcript-body">Waiting for transcript…</div>
    </section>
    <section id="fields">
      <div id="sellometer" hidden>
        <h2>Sell-o-meter <span id="sm-score" style="float:right">0 / 100</span></h2>
        <div id="sm-bar"><div id="sm-fill"></div></div>
        <div id="sm-chips"></div>
      </div>
      <h2>Caller Info</h2>
      <div class="field" data-key="firstname">
        <span class="dot"></span><label>First name</label><input type="text" />
      </div>
      <div class="field" data-key="lastname">
        <span class="dot"></span><label>Last name</label><input type="text" />
      </div>
      <div class="field" data-key="email">
        <span class="dot"></span><label>Email</label><input type="email" />
      </div>
      <div class="field" data-key="phone">
        <span class="dot"></span><label>Phone</label><input type="tel" />
      </div>
      <div class="field" data-key="company">
        <span class="dot"></span><label>Company</label><input type="text" />
      </div>

      <h2 style="margin-top:16px">Jobsite</h2>
      <div class="field" data-key="address">
        <span class="dot"></span><label>Street</label><input type="text" />
      </div>
      <div class="field" data-key="city">
        <span class="dot"></span><label>City</label><input type="text" />
      </div>
      <div class="field" data-key="state">
        <span class="dot"></span><label>State</label><input type="text" />
      </div>
      <div class="field" data-key="zip">
        <span class="dot"></span><label>ZIP</label><input type="text" />
      </div>

      <div class="actions">
        <button id="lookup">🔍 Lookup HubSpot Contact</button>
        <button id="upsert">✅ Create / Update Contact</button>
        <hr />
        <button id="scope">✨ Generate Scope Summary</button>
        <textarea id="scope-text" placeholder="Scope summary will appear here…"></textarea>
        <button id="deal" disabled>💼 Create Deal</button>
        <hr />
        <button id="copy" class="secondary">📋 Copy Transcript</button>
        <div id="claude-tools"></div>
      </div>
    </section>
  </main>
  <div id="toast"></div>

  <script>
    // ---- setup ----
    const params = new URLSearchParams(location.search);
    const repId = params.get("rep");
    if (!repId) {
      document.getElementById("transcript-body").textContent =
        "Missing ?rep=<extension_id> in the URL.";
      throw new Error("missing rep");
    }
    // Auth is the shared-password session cookie (sent automatically, same-origin).

    let currentSid = null;
    let lastContactId = null;
    let lastTranscript = "";
    let lastHighlights = [];
    const touchedFields = new Set();

    // ---- transcript renderer (ported from slop-cop's buildHighlightedHTML) ----
    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\n/g, "<br>");
    }

    function buildHighlightedHTML(text, highlights) {
      if (!text) return "";
      if (!highlights || highlights.length === 0) return escapeHtml(text);
      const events = new Set([0, text.length]);
      for (const h of highlights) {
        events.add(Math.max(0, h.start));
        events.add(Math.min(text.length, h.end));
      }
      const sorted = [...events].sort((a, b) => a - b);
      let html = "";
      for (let i = 0; i < sorted.length - 1; i++) {
        const s = sorted[i], e = sorted[i + 1];
        const chunk = text.slice(s, e);
        if (!chunk) continue;
        const matching = highlights.filter(h => h.start <= s && h.end >= e);
        if (matching.length === 0) {
          html += escapeHtml(chunk);
        } else {
          // Shortest-span wins (most specific).
          const primary = matching.reduce((a, b) =>
            (a.end - a.start) <= (b.end - b.start) ? a : b
          );
          const dataAttrs =
            ` data-value="${escapeHtml(primary.value ?? "")}"` +
            (primary.field ? ` data-field="${escapeHtml(primary.field)}"` : "");
          html += `<mark class="hl hl-${primary.ruleId}"${dataAttrs}>${escapeHtml(chunk)}</mark>`;
        }
      }
      return html;
    }

    // Skip the innerHTML swap when it would clobber an in-progress copy or
    // when nothing actually changed — otherwise every 3s poll would nuke the
    // user's selection and scroll position.
    let lastRenderedTranscript = null;
    let lastRenderedHighlightKey = null;

    function renderTranscript() {
      const body = document.getElementById("transcript-body");
      if (!lastTranscript) {
        body.textContent = "Waiting for transcript…";
        lastRenderedTranscript = null;
        lastRenderedHighlightKey = null;
        return;
      }
      const hlKey = JSON.stringify(lastHighlights);
      if (lastTranscript === lastRenderedTranscript
          && hlKey === lastRenderedHighlightKey) {
        return;  // nothing to redraw
      }
      // If the user has an active selection inside the transcript, defer the
      // re-render so Ctrl-C works. Next poll will retry.
      const sel = window.getSelection && window.getSelection();
      if (sel && sel.toString().length > 0
          && sel.anchorNode && body.contains(sel.anchorNode)) {
        return;
      }
      const atBottom = Math.abs(body.scrollHeight - body.scrollTop - body.clientHeight) < 20;
      body.innerHTML = buildHighlightedHTML(lastTranscript, lastHighlights);
      lastRenderedTranscript = lastTranscript;
      lastRenderedHighlightKey = hlKey;
      if (atBottom) body.scrollTop = body.scrollHeight;
    }

    function authHeaders(extra = {}) {
      return { "content-type": "application/json", ...extra };
    }

    function toast(msg, isError = false) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.className = "show" + (isError ? " error" : "");
      setTimeout(() => { el.className = ""; }, 4000);
    }

    function getFieldInput(key) {
      return document.querySelector(`.field[data-key="${key}"] input`);
    }
    function getFieldDot(key) {
      return document.querySelector(`.field[data-key="${key}"] .dot`);
    }

    // ---- inputs track "touched" so polling doesn't overwrite ----
    document.querySelectorAll(".field input").forEach(inp => {
      inp.addEventListener("input", () => {
        const key = inp.parentElement.dataset.key;
        touchedFields.add(key);
      });
    });

    // ---- click a highlight to populate its field ----
    document.getElementById("transcript-body").addEventListener("click", (e) => {
      const mark = e.target.closest("mark.hl[data-field]");
      if (!mark) return;
      const key = mark.dataset.field;
      const input = getFieldInput(key);
      if (!input) return;
      input.value = mark.dataset.value || "";
      touchedFields.add(key);
      const dot = getFieldDot(key);
      if (dot && input.value) dot.classList.add("green");
    });

    // ---- polling ----
    async function pollCall() {
      try {
        const r = await fetch(`/api/calls/latest?rep=${encodeURIComponent(repId)}`, {
          headers: authHeaders(),
        });
        if (r.status === 404) {
          document.getElementById("session-info").innerHTML =
            '<span class="ended">No active call for this rep</span>';
          return;
        }
        if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
        const data = await r.json();
        currentSid = data.call.sessionId;
        lastTranscript = data.transcript || "";
        renderTranscript();
        document.getElementById("session-info").textContent =
          `${data.call.direction || ""} • ${data.call.status || ""} • ${currentSid}`;
      } catch (e) {
        document.getElementById("session-info").textContent = `Poll error: ${e.message}`;
      }
    }

    async function pollExtracted() {
      if (!currentSid) return;
      try {
        const r = await fetch(`/api/calls/${encodeURIComponent(currentSid)}/extracted`, {
          headers: authHeaders(),
        });
        if (r.status === 404) return;  // no extraction yet
        if (!r.ok) return;
        const extracted = await r.json();
        lastHighlights = extracted.highlights || [];
        renderTranscript();
        for (const [key, value] of Object.entries(extracted)) {
          if (key === "highlights") continue;  // rendered as <mark> spans, not an input
          const input = getFieldInput(key);
          const dot = getFieldDot(key);
          if (!input || !dot) continue;
          if (value) dot.classList.add("green");
          else dot.classList.remove("green");
          if (!touchedFields.has(key) && value != null) {
            input.value = value;
          }
        }
      } catch (_) { /* silent — just skip this tick */ }
    }

    async function pollSellometer() {
      if (!currentSid) return;
      try {
        const r = await fetch(`/api/calls/${encodeURIComponent(currentSid)}/sellometer`, {
          headers: authHeaders(),
        });
        if (!r.ok) return;  // 404 until the worker's first compute
        renderSellometer(await r.json());
      } catch (_) { /* silent — just skip this tick */ }
    }

    function renderSellometer(sm) {
      document.getElementById("sellometer").hidden = false;
      document.getElementById("sm-score").textContent = `${sm.score} / ${sm.max}`;
      document.getElementById("sm-fill").style.width =
        sm.max ? `${Math.round(100 * sm.score / sm.max)}%` : "0%";
      const chips = document.getElementById("sm-chips");
      chips.innerHTML = "";
      for (const cp of sm.checkpoints || []) {
        const chip = document.createElement("span");
        chip.className = "sm-chip" + (cp.hit ? " hit" : "");
        const dot = document.createElement("span");
        dot.className = "dot" + (cp.hit ? " green" : "");
        chip.appendChild(dot);
        chip.appendChild(document.createTextNode(`${cp.label} +${cp.points}`));
        chips.appendChild(chip);
      }
    }

    setInterval(pollCall, 2000);
    setInterval(pollExtracted, 3000);
    setInterval(pollSellometer, 3000);
    pollCall();

    // ---- button actions ----
    function readFields() {
      const out = {};
      document.querySelectorAll(".field").forEach(f => {
        const key = f.dataset.key;
        const v = f.querySelector("input").value.trim();
        if (v) out[key] = v;
      });
      return out;
    }

    document.getElementById("lookup").addEventListener("click", async () => {
      const fields = readFields();
      const r = await fetch("/api/hubspot/contacts/lookup", {
        method: "POST", headers: authHeaders(),
        body: JSON.stringify({ email: fields.email, phone: fields.phone }),
      });
      if (r.status === 404) return toast("No matching contact in HubSpot", false);
      if (!r.ok) return toast(`Lookup error: ${await r.text()}`, true);
      const data = await r.json();
      lastContactId = data.id;
      toast(`Match: ${data.properties.firstname || ""} ${data.properties.lastname || ""} (id ${data.id})`);
    });

    document.getElementById("upsert").addEventListener("click", async () => {
      const r = await fetch("/api/hubspot/contacts", {
        method: "POST", headers: authHeaders(),
        body: JSON.stringify(readFields()),
      });
      if (!r.ok) return toast(`Upsert error: ${await r.text()}`, true);
      const data = await r.json();
      lastContactId = data.contactId;
      document.getElementById("deal").disabled = false;
      toast(`Contact ready: id ${data.contactId}`);
    });

    document.getElementById("scope").addEventListener("click", async () => {
      if (!currentSid) return toast("No active session", true);
      const btn = document.getElementById("scope");
      btn.disabled = true; btn.textContent = "Generating…";
      try {
        const r = await fetch(`/api/calls/${encodeURIComponent(currentSid)}/scope-summary`, {
          method: "POST", headers: authHeaders(),
        });
        if (!r.ok) return toast(`Scope error: ${await r.text()}`, true);
        const data = await r.json();
        document.getElementById("scope-text").value = data.summary;
        toast("Scope summary generated");
      } finally {
        btn.disabled = false; btn.textContent = "✨ Generate Scope Summary";
      }
    });

    document.getElementById("deal").addEventListener("click", async () => {
      if (!lastContactId) return toast("Create contact first", true);
      const fields = readFields();
      const dealname = `${fields.firstname || ""} ${fields.lastname || ""}`.trim()
                       + (fields.address ? " — " + fields.address : "");
      const description = document.getElementById("scope-text").value.trim();
      if (!description) return toast("Generate or type a scope first", true);
      const r = await fetch("/api/hubspot/deals", {
        method: "POST", headers: authHeaders(),
        body: JSON.stringify({
          contactId: lastContactId, dealname: dealname || "New lead",
          description,
        }),
      });
      if (!r.ok) return toast(`Deal error: ${await r.text()}`, true);
      const data = await r.json();
      toast(`Deal created: id ${data.dealId}`);
    });

    document.getElementById("copy").addEventListener("click", async () => {
      const txt = document.getElementById("transcript-body").textContent;
      try {
        await navigator.clipboard.writeText(txt);
        toast("Transcript copied to clipboard");
      } catch (e) {
        toast(`Copy failed: ${e.message}`, true);
      }
    });

    // ---- Claude project buttons (rendered from /api/calls/config) ----
    async function openInClaude(tool) {
      const txt = document.getElementById("transcript-body").textContent.trim();
      if (!txt || txt === "Waiting for transcript…") {
        return toast("No transcript yet", true);
      }
      if (!tool.url) {
        return toast("Claude URL not loaded yet — try again in a moment", true);
      }
      // Sell-o-meter checkpoint: fire-and-forget; never block opening the tool.
      if (tool.event && currentSid) {
        fetch(`/api/calls/${encodeURIComponent(currentSid)}/events`, {
          method: "POST", headers: authHeaders(),
          body: JSON.stringify({ event: tool.event }),
        }).catch(() => {});
      }
      try {
        await navigator.clipboard.writeText(txt);
        window.open(tool.url, "_blank");
        toast("Transcript copied — paste into Claude (Ctrl/Cmd+V)");
      } catch (e) {
        // Clipboard blocked — still open Claude so the rep can copy manually.
        window.open(tool.url, "_blank");
        toast("Opened Claude — copy the transcript manually (clipboard blocked)", true);
      }
    }

    (async function loadClaudeTools() {
      let tools = [];
      try {
        const r = await fetch("/api/calls/config", { headers: authHeaders() });
        if (r.ok) tools = (await r.json()).claudeTools || [];
      } catch (_) { /* leave empty */ }
      const box = document.getElementById("claude-tools");
      box.innerHTML = "";
      for (const t of tools) {
        const b = document.createElement("button");
        b.className = "secondary";
        b.textContent = t.label;
        b.addEventListener("click", () => openInClaude(t));
        box.appendChild(b);
      }
    })();
  </script>
</body>
</html>
